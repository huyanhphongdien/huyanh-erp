<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>B2B Chat - Huy Anh Rubber ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Be Vietnam Pro', -apple-system, BlinkMacSystemFont, sans-serif; }
    @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap');
    
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(100%); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-slide-up { animation: slide-up 0.3s ease-out; }
    
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .animate-fade-in { animation: fade-in 0.2s ease-out; }
    
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-gray-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ============================================================
    // ICONS (using Lucide)
    // ============================================================
    const Icon = ({ name, size = 20, className = '' }) => {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current) {
          ref.current.innerHTML = '';
          const icon = lucide.createElement(lucide.icons[name]);
          icon.setAttribute('width', size);
          icon.setAttribute('height', size);
          if (className) icon.setAttribute('class', className);
          ref.current.appendChild(icon);
        }
      }, [name, size, className]);
      return <span ref={ref} className="inline-flex" />;
    };

    // ============================================================
    // MOCK DATA
    // ============================================================
    
    // Online users (đại lý, hộ nông dân đang online)
    const mockOnlineUsers = [
      { id: '1', name: 'Anh Thành', code: 'DL-0001', type: 'dealer', tier: 'Gold', avatar: 'T', lastActive: 'Đang hoạt động' },
      { id: '2', name: 'Chị Lan', code: 'NCC-0015', type: 'farmer', tier: 'Bronze', avatar: 'L', lastActive: '2 phút trước' },
      { id: '3', name: 'Anh Minh', code: 'DL-0004', type: 'dealer', tier: 'Platinum', avatar: 'M', lastActive: 'Đang hoạt động' },
      { id: '4', name: 'Ông Bảy', code: 'NCC-0023', type: 'farmer', tier: 'Silver', avatar: 'B', lastActive: '5 phút trước' },
      { id: '5', name: 'Anh Hùng', code: 'DL-0002', type: 'dealer', tier: 'Silver', avatar: 'H', lastActive: 'Đang hoạt động' },
      { id: '6', name: 'Cô Hoa', code: 'NCC-0031', type: 'farmer', tier: 'Bronze', avatar: 'H', lastActive: '1 phút trước' },
    ];

    const mockRooms = [
      { id: '1', name: 'Đại lý Thành Công', code: 'DL-0001', tier: 'Gold', lastMessage: 'OK deal! Khi nào giao được?', time: '2 phút', unread: 0, hasBooking: true },
      { id: '2', name: 'Đại lý Phú Quý', code: 'DL-0002', tier: 'Silver', lastMessage: 'Giá 8500đ/kg khô được không?', time: '15 phút', unread: 2, hasBooking: false },
      { id: '3', name: 'NCC Lào - Savannakhet', code: 'DL-0004', tier: 'Platinum', lastMessage: 'Xe sẽ đến vào thứ 5', time: '1 giờ', unread: 0, hasBooking: true },
      { id: '4', name: 'Đại lý Hoàng Long', code: 'DL-0003', tier: 'Bronze', lastMessage: 'Cảm ơn anh, tuần sau giao nhé', time: '3 giờ', unread: 1, hasBooking: false },
      { id: '5', name: 'Hộ Nguyễn Văn A', code: 'NCC-0012', tier: 'Bronze', lastMessage: 'Mình có 2 tấn mủ tạp', time: '5 giờ', unread: 0, hasBooking: false },
    ];

    const mockMessages = [
      { id: '1', sender: 'partner', name: 'Anh Thành', content: 'Chào nhà máy, mình có lô mủ nước khoảng 5 tấn', time: '09:15' },
      { id: '2', sender: 'factory', name: 'Nhà máy', content: 'Chào anh Thành! Mủ nước loại gì ạ? DRC dự kiến bao nhiêu?', time: '09:18' },
      { id: '3', sender: 'partner', name: 'Anh Thành', content: 'Mủ nước tươi, DRC khoảng 28-30%', time: '09:20' },
      { id: '4', sender: 'factory', name: 'Nhà máy', content: 'Giá thị trường đang 8.200đ/kg khô. Anh muốn giá bao nhiêu?', time: '09:22' },
      { id: '5', sender: 'partner', name: 'Anh Thành', content: 'Mình muốn 8.500đ/kg khô được không?', time: '09:25' },
      { id: '6', sender: 'factory', name: 'Nhà máy', content: '8.400đ/kg khô được anh nhé, mình lấy hết 5 tấn', time: '09:28' },
      { id: '7', sender: 'partner', name: 'Anh Thành', content: 'OK deal! Khi nào giao được?', time: '09:30' },
      { id: '8', sender: 'system', content: '📋 Đã tạo Phiếu chốt mủ CM-2603-0001\n• Sản phẩm: Mủ nước\n• Khối lượng: 5 tấn\n• Giá: 8.400đ/kg khô', time: '09:32' },
      { id: '9', sender: 'factory', name: 'Nhà máy', content: 'Mình đã tạo phiếu chốt mủ rồi anh. Tuần sau thứ 3 giao được không?', time: '09:33' },
      { id: '10', sender: 'partner', name: 'Anh Thành', content: 'OK anh, thứ 3 tuần sau mình cho xe chở qua nhé! 👍', time: '09:35' },
    ];

    // ============================================================
    // HELPERS
    // ============================================================
    const getTierColor = (tier) => {
      switch (tier) {
        case 'Platinum': return 'bg-purple-100 text-purple-700 border-purple-200';
        case 'Gold': return 'bg-amber-100 text-amber-700 border-amber-200';
        case 'Silver': return 'bg-gray-200 text-gray-700 border-gray-300';
        default: return 'bg-orange-100 text-orange-700 border-orange-200';
      }
    };

    const getTierGradient = (tier) => {
      switch (tier) {
        case 'Platinum': return 'from-purple-500 to-purple-600';
        case 'Gold': return 'from-amber-500 to-amber-600';
        case 'Silver': return 'from-gray-400 to-gray-500';
        default: return 'from-orange-400 to-orange-500';
      }
    };

    // ============================================================
    // CHAT ROOM LIST
    // ============================================================
    const ChatRoomList = ({ onSelectRoom }) => {
      const [searchTerm, setSearchTerm] = useState('');
      
      const filteredRooms = mockRooms.filter(room => {
        if (!searchTerm) return true;
        const s = searchTerm.toLowerCase();
        return room.name.toLowerCase().includes(s) || room.code.toLowerCase().includes(s);
      });

      return (
        <div className="flex flex-col h-full bg-gray-50">
          {/* Header */}
          <div className="bg-white border-b border-gray-200 px-4 py-4 sticky top-0 z-10">
            <div className="flex items-center justify-between mb-4">
              <div className="flex items-center gap-3">
                <div className="w-11 h-11 bg-gradient-to-br from-emerald-500 to-emerald-600 rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-500/20">
                  <Icon name="MessageSquare" size={22} className="text-white" />
                </div>
                <div>
                  <h1 className="text-xl font-bold text-gray-900">Tin nhắn</h1>
                  <p className="text-sm text-gray-500">{mockRooms.length} cuộc hội thoại</p>
                </div>
              </div>
              <button className="flex items-center gap-2 px-4 py-2.5 bg-gradient-to-r from-emerald-500 to-emerald-600 text-white rounded-xl font-semibold hover:shadow-lg hover:shadow-emerald-500/30 active:scale-95 transition-all">
                <Icon name="Plus" size={18} />
                <span>Chat mới</span>
              </button>
            </div>
            
            {/* Search */}
            <div className="relative">
              <div className="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400">
                <Icon name="Search" size={20} />
              </div>
              <input
                type="text"
                placeholder="Tìm kiếm đối tác, tin nhắn..."
                value={searchTerm}
                onChange={(e) => setSearchTerm(e.target.value)}
                className="w-full pl-11 pr-4 py-3.5 bg-gray-100 border-0 rounded-2xl text-[15px] focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all placeholder:text-gray-400"
              />
            </div>
          </div>

          {/* Stats */}
          <div className="px-4 py-3 flex gap-3">
            <div className="flex-1 bg-white rounded-2xl p-3 text-center shadow-sm">
              <p className="text-2xl font-bold text-emerald-600">12</p>
              <p className="text-xs text-gray-500">Phiếu chốt</p>
            </div>
            <div className="flex-1 bg-white rounded-2xl p-3 text-center shadow-sm">
              <p className="text-2xl font-bold text-amber-600">3</p>
              <p className="text-xs text-gray-500">Chờ giao</p>
            </div>
            <div className="flex-1 bg-white rounded-2xl p-3 text-center shadow-sm">
              <p className="text-2xl font-bold text-blue-600">45T</p>
              <p className="text-xs text-gray-500">Tháng này</p>
            </div>
          </div>

          {/* Online Users Section */}
          <div className="px-4 pb-3">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-2">
                <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse" />
                <span className="text-sm font-semibold text-gray-700">Đang online</span>
                <span className="text-xs text-gray-400">({mockOnlineUsers.filter(u => u.lastActive === 'Đang hoạt động').length})</span>
              </div>
              <button className="text-xs text-emerald-600 font-medium">Xem tất cả</button>
            </div>
            
            {/* Horizontal scroll online users */}
            <div className="flex gap-3 overflow-x-auto hide-scrollbar pb-1">
              {mockOnlineUsers.map((user, idx) => {
                const isOnline = user.lastActive === 'Đang hoạt động';
                return (
                  <div 
                    key={user.id}
                    className="flex-shrink-0 flex flex-col items-center w-16 cursor-pointer group"
                    style={{ animationDelay: `${idx * 50}ms` }}
                  >
                    <div className="relative mb-1">
                      <div className={`w-12 h-12 bg-gradient-to-br ${getTierGradient(user.tier)} rounded-full flex items-center justify-center text-white font-bold text-sm shadow-md group-hover:scale-110 transition-transform`}>
                        {user.avatar}
                      </div>
                      {/* Online indicator */}
                      <div className={`absolute bottom-0 right-0 w-3.5 h-3.5 rounded-full border-2 border-white ${isOnline ? 'bg-green-500' : 'bg-gray-400'}`} />
                      {/* Type badge */}
                      <div className={`absolute -top-1 -right-1 w-5 h-5 rounded-full flex items-center justify-center text-[8px] border-2 border-white ${user.type === 'dealer' ? 'bg-blue-500 text-white' : 'bg-amber-500 text-white'}`}>
                        {user.type === 'dealer' ? 'ĐL' : 'ND'}
                      </div>
                    </div>
                    <p className="text-[10px] font-medium text-gray-700 truncate w-full text-center">{user.name}</p>
                    <p className="text-[9px] text-gray-400 truncate w-full text-center">
                      {isOnline ? (
                        <span className="text-green-600">● Online</span>
                      ) : (
                        user.lastActive
                      )}
                    </p>
                  </div>
                );
              })}
              
              {/* Add new contact button */}
              <div className="flex-shrink-0 flex flex-col items-center w-16 cursor-pointer group">
                <div className="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center text-gray-400 group-hover:bg-emerald-100 group-hover:text-emerald-600 transition-colors mb-1">
                  <Icon name="UserPlus" size={20} />
                </div>
                <p className="text-[10px] font-medium text-gray-500">Thêm mới</p>
              </div>
            </div>
          </div>

          {/* Divider */}
          <div className="px-4 pb-2">
            <div className="flex items-center gap-2">
              <div className="flex-1 h-px bg-gray-200" />
              <span className="text-xs text-gray-400 font-medium">Cuộc trò chuyện</span>
              <div className="flex-1 h-px bg-gray-200" />
            </div>
          </div>

          {/* Room List */}
          <div className="flex-1 overflow-y-auto hide-scrollbar">
            {filteredRooms.map((room, idx) => (
              <div
                key={room.id}
                onClick={() => onSelectRoom(room)}
                className="flex items-center gap-4 px-4 py-4 bg-white hover:bg-gray-50 active:bg-gray-100 cursor-pointer transition-colors border-b border-gray-100 animate-fade-in"
                style={{ animationDelay: `${idx * 50}ms` }}
              >
                {/* Avatar */}
                <div className="relative flex-shrink-0">
                  <div className={`w-14 h-14 bg-gradient-to-br ${getTierGradient(room.tier)} rounded-2xl flex items-center justify-center text-white font-bold text-xl shadow-lg`}>
                    {room.name.charAt(0)}
                  </div>
                  <div className={`absolute -bottom-1 -right-1 w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold border-2 border-white ${getTierColor(room.tier)}`}>
                    {room.tier.charAt(0)}
                  </div>
                </div>

                {/* Content */}
                <div className="flex-1 min-w-0">
                  <div className="flex items-center justify-between mb-1">
                    <h3 className="font-semibold text-gray-900 truncate">{room.name}</h3>
                    <span className="text-xs text-gray-400 flex-shrink-0 ml-2">{room.time}</span>
                  </div>
                  <div className="flex items-center gap-2">
                    <p className="text-sm text-gray-500 truncate flex-1">{room.lastMessage}</p>
                    {room.unread > 0 && (
                      <span className="flex-shrink-0 min-w-[20px] h-5 px-1.5 bg-emerald-500 text-white text-xs rounded-full flex items-center justify-center font-semibold">
                        {room.unread}
                      </span>
                    )}
                  </div>
                  <div className="flex items-center gap-2 mt-2">
                    <span className="text-xs text-gray-500 bg-gray-100 px-2 py-0.5 rounded-lg">{room.code}</span>
                    {room.hasBooking && (
                      <span className="text-xs text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-lg font-medium">
                        ✓ Có phiếu chốt
                      </span>
                    )}
                  </div>
                </div>
                
                <div className="text-gray-300">
                  <Icon name="ChevronRight" size={20} />
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // ============================================================
    // CHAT ROOM DETAIL
    // ============================================================
    const ChatRoomDetail = ({ room, onBack }) => {
      const [inputValue, setInputValue] = useState('');
      const [showBookingModal, setShowBookingModal] = useState(false);
      const [messages, setMessages] = useState(mockMessages);
      const [sending, setSending] = useState(false);
      const messagesEndRef = useRef(null);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages]);

      const handleSend = () => {
        if (!inputValue.trim()) return;
        setSending(true);
        
        setTimeout(() => {
          setMessages(prev => [...prev, {
            id: Date.now().toString(),
            sender: 'factory',
            name: 'Nhà máy',
            content: inputValue,
            time: new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' })
          }]);
          setInputValue('');
          setSending(false);
        }, 300);
      };

      const handleCreateBooking = () => {
        setMessages(prev => [...prev, {
          id: Date.now().toString(),
          sender: 'system',
          content: '📋 Đã tạo Phiếu chốt mủ CM-2603-0002\n• Sản phẩm: Mủ nước\n• Khối lượng: 3 tấn\n• Giá: 8.500đ/kg khô',
          time: new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' })
        }]);
        setShowBookingModal(false);
      };

      return (
        <div className="flex flex-col h-full bg-gray-100 relative">
          {/* Header */}
          <div className="bg-white border-b border-gray-200 px-3 py-3 flex items-center gap-2 sticky top-0 z-10">
            <button 
              onClick={onBack} 
              className="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-gray-100 active:bg-gray-200 transition-colors"
            >
              <Icon name="ArrowLeft" size={22} className="text-gray-600" />
            </button>
            
            <div className="flex items-center gap-3 flex-1 min-w-0">
              <div className={`w-11 h-11 bg-gradient-to-br ${getTierGradient(room.tier)} rounded-xl flex items-center justify-center text-white font-bold text-lg shadow-md flex-shrink-0`}>
                {room.name.charAt(0)}
              </div>
              <div className="min-w-0">
                <h1 className="font-semibold text-gray-900 truncate">{room.name}</h1>
                <div className="flex items-center gap-2">
                  <span className="text-sm text-gray-500">{room.code}</span>
                  <span className={`text-[10px] px-1.5 py-0.5 rounded font-medium ${getTierColor(room.tier)}`}>
                    {room.tier}
                  </span>
                </div>
              </div>
            </div>

            <button className="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-gray-100">
              <Icon name="Phone" size={20} className="text-gray-600" />
            </button>
            <button className="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-gray-100">
              <Icon name="MoreVertical" size={20} className="text-gray-600" />
            </button>
          </div>

          {/* Messages */}
          <div className="flex-1 overflow-y-auto px-4 py-4 space-y-3 hide-scrollbar">
            {/* Date separator */}
            <div className="flex items-center justify-center">
              <span className="text-xs text-gray-500 bg-white px-4 py-1.5 rounded-full shadow-sm font-medium">
                Hôm nay, 05/03/2026
              </span>
            </div>

            {messages.map((msg, idx) => {
              if (msg.sender === 'system') {
                return (
                  <div key={msg.id} className="flex justify-center animate-fade-in">
                    <div className="bg-gradient-to-r from-amber-50 to-orange-50 border border-amber-200 rounded-2xl px-4 py-3 max-w-[85%] shadow-sm">
                      <p className="text-sm text-amber-800 whitespace-pre-line leading-relaxed">{msg.content}</p>
                      <p className="text-[10px] text-amber-500 mt-1 text-right">{msg.time}</p>
                    </div>
                  </div>
                );
              }

              const isMine = msg.sender === 'factory';
              return (
                <div 
                  key={msg.id} 
                  className={`flex ${isMine ? 'justify-end' : 'justify-start'} animate-fade-in`}
                  style={{ animationDelay: `${idx * 30}ms` }}
                >
                  <div className="max-w-[80%]">
                    {!isMine && (
                      <p className="text-xs text-gray-500 mb-1 ml-3 font-medium">{msg.name}</p>
                    )}
                    <div className={`rounded-2xl px-4 py-2.5 ${
                      isMine 
                        ? 'bg-gradient-to-r from-emerald-500 to-emerald-600 text-white rounded-br-md shadow-lg shadow-emerald-500/20' 
                        : 'bg-white text-gray-900 rounded-bl-md shadow-sm'
                    }`}>
                      <p className="text-[15px] leading-relaxed">{msg.content}</p>
                    </div>
                    <p className={`text-[10px] text-gray-400 mt-1 ${isMine ? 'text-right mr-1' : 'ml-3'}`}>
                      {msg.time}
                    </p>
                  </div>
                </div>
              );
            })}
            <div ref={messagesEndRef} />
          </div>

          {/* Quick action */}
          {!room.hasBooking && (
            <div className="px-4 pb-2">
              <button
                onClick={() => setShowBookingModal(true)}
                className="w-full flex items-center justify-center gap-2 py-3.5 bg-gradient-to-r from-amber-50 to-orange-50 border border-amber-200 rounded-2xl text-amber-700 font-semibold hover:from-amber-100 hover:to-orange-100 active:scale-[0.98] transition-all shadow-sm"
              >
                <Icon name="FileText" size={20} />
                Tạo phiếu chốt mủ từ cuộc chat này
              </button>
            </div>
          )}

          {/* Input */}
          <div className="bg-white border-t border-gray-200 px-4 py-3">
            <div className="flex items-end gap-2">
              <button className="w-11 h-11 flex items-center justify-center rounded-xl hover:bg-gray-100 flex-shrink-0 text-gray-500">
                <Icon name="Plus" size={22} />
              </button>
              <div className="flex-1 bg-gray-100 rounded-2xl px-4 py-3">
                <input
                  type="text"
                  value={inputValue}
                  onChange={(e) => setInputValue(e.target.value)}
                  onKeyDown={(e) => e.key === 'Enter' && handleSend()}
                  placeholder="Nhập tin nhắn..."
                  className="w-full bg-transparent border-0 focus:outline-none text-[15px]"
                />
              </div>
              <button 
                onClick={handleSend}
                disabled={!inputValue.trim() || sending}
                className={`w-11 h-11 flex items-center justify-center rounded-xl flex-shrink-0 transition-all ${
                  inputValue.trim() 
                    ? 'bg-gradient-to-r from-emerald-500 to-emerald-600 text-white hover:shadow-lg hover:shadow-emerald-500/30 active:scale-95' 
                    : 'bg-gray-100 text-gray-400'
                }`}
              >
                <Icon name="Send" size={20} />
              </button>
            </div>
          </div>

          {/* Booking Modal */}
          {showBookingModal && (
            <div className="absolute inset-0 z-50 flex items-end justify-center">
              <div 
                className="absolute inset-0 bg-black/50 backdrop-blur-sm animate-fade-in" 
                onClick={() => setShowBookingModal(false)} 
              />
              <div className="relative w-full bg-white rounded-t-3xl max-h-[90%] overflow-hidden animate-slide-up">
                {/* Modal Header */}
                <div className="sticky top-0 bg-white border-b border-gray-100 px-4 py-4 flex items-center justify-between">
                  <h2 className="text-xl font-bold text-gray-900">Tạo phiếu chốt mủ</h2>
                  <button 
                    onClick={() => setShowBookingModal(false)} 
                    className="w-9 h-9 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-500"
                  >
                    <Icon name="X" size={22} />
                  </button>
                </div>

                {/* Modal Content */}
                <div className="p-4 space-y-4 overflow-y-auto max-h-[65vh] hide-scrollbar">
                  {/* Partner info */}
                  <div className="bg-gradient-to-r from-emerald-50 to-teal-50 rounded-2xl p-4 flex items-center gap-3 border border-emerald-100">
                    <div className={`w-14 h-14 bg-gradient-to-br ${getTierGradient(room.tier)} rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-md`}>
                      {room.name.charAt(0)}
                    </div>
                    <div>
                      <p className="font-semibold text-gray-900 text-lg">{room.name}</p>
                      <div className="flex items-center gap-2 mt-0.5">
                        <span className="text-sm text-gray-600">{room.code}</span>
                        <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${getTierColor(room.tier)}`}>
                          {room.tier}
                        </span>
                      </div>
                    </div>
                  </div>

                  {/* Product Type */}
                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-2">
                      Loại sản phẩm <span className="text-red-500">*</span>
                    </label>
                    <select className="w-full px-4 py-3.5 bg-gray-100 border-0 rounded-xl text-[15px] focus:outline-none focus:ring-2 focus:ring-emerald-500 font-medium">
                      <option>Mủ nước</option>
                      <option>Mủ tạp</option>
                      <option>Mủ đông</option>
                      <option>Mủ chén</option>
                    </select>
                  </div>

                  {/* Quantity & DRC */}
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-2">
                        KL dự kiến (tấn) <span className="text-red-500">*</span>
                      </label>
                      <input 
                        type="number" 
                        defaultValue="3" 
                        className="w-full px-4 py-3.5 bg-gray-100 border-0 rounded-xl text-[15px] focus:outline-none focus:ring-2 focus:ring-emerald-500 text-right font-mono font-semibold" 
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-2">
                        DRC dự kiến (%)
                      </label>
                      <input 
                        type="number" 
                        defaultValue="28" 
                        className="w-full px-4 py-3.5 bg-gray-100 border-0 rounded-xl text-[15px] focus:outline-none focus:ring-2 focus:ring-emerald-500 text-right font-mono font-semibold" 
                      />
                    </div>
                  </div>

                  {/* Price */}
                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-2">Giá thỏa thuận</label>
                    <div className="flex gap-2">
                      <input 
                        type="number" 
                        defaultValue="8500" 
                        className="flex-1 px-4 py-3.5 bg-gray-100 border-0 rounded-xl text-[15px] focus:outline-none focus:ring-2 focus:ring-emerald-500 text-right font-mono font-semibold" 
                      />
                      <select className="w-32 px-3 py-3.5 bg-gray-100 border-0 rounded-xl text-[15px] focus:outline-none focus:ring-2 focus:ring-emerald-500 font-medium">
                        <option>đ/kg khô</option>
                        <option>đ/kg ướt</option>
                        <option>đ/tấn</option>
                      </select>
                    </div>
                  </div>

                  {/* Estimated value */}
                  <div className="bg-gradient-to-r from-amber-50 to-orange-50 rounded-2xl p-4 text-center border border-amber-200">
                    <p className="text-sm text-amber-600 font-medium">Giá trị ước tính</p>
                    <p className="text-3xl font-bold text-amber-700 mt-1">71.400.000 đ</p>
                    <p className="text-xs text-amber-500 mt-1">3 tấn × 28% DRC × 8.500đ/kg</p>
                  </div>

                  {/* Delivery Date */}
                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-2">Ngày giao dự kiến</label>
                    <input 
                      type="date" 
                      defaultValue="2026-03-10"
                      className="w-full px-4 py-3.5 bg-gray-100 border-0 rounded-xl text-[15px] focus:outline-none focus:ring-2 focus:ring-emerald-500" 
                    />
                  </div>

                  {/* Notes */}
                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-2">Ghi chú thương lượng</label>
                    <textarea 
                      rows={3} 
                      defaultValue="Đã thỏa thuận qua chat. Giao hàng tại nhà máy Phong Điền."
                      placeholder="Tóm tắt nội dung đã thỏa thuận..." 
                      className="w-full px-4 py-3 bg-gray-100 border-0 rounded-xl text-[15px] focus:outline-none focus:ring-2 focus:ring-emerald-500 resize-none" 
                    />
                  </div>
                </div>

                {/* Actions */}
                <div className="sticky bottom-0 bg-white border-t border-gray-100 px-4 py-4 flex gap-3">
                  <button 
                    onClick={() => setShowBookingModal(false)} 
                    className="flex-1 py-4 bg-gray-100 text-gray-700 rounded-xl font-semibold hover:bg-gray-200 active:scale-[0.98] transition-all"
                  >
                    Hủy
                  </button>
                  <button 
                    onClick={handleCreateBooking}
                    className="flex-1 py-4 bg-gradient-to-r from-emerald-500 to-emerald-600 text-white rounded-xl font-semibold hover:shadow-lg hover:shadow-emerald-500/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2"
                  >
                    <Icon name="Check" size={20} />
                    Tạo phiếu chốt
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ============================================================
    // MAIN APP
    // ============================================================
    const App = () => {
      const [selectedRoom, setSelectedRoom] = useState(null);
      const [view, setView] = useState('list');

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          {/* Phone frame */}
          <div className="relative">
            {/* Title */}
            <div className="text-center mb-4">
              <h1 className="text-white text-2xl font-bold">B2B Chat Platform</h1>
              <p className="text-gray-400 text-sm">Huy Anh Rubber ERP - Demo</p>
            </div>
            
            {/* Phone */}
            <div className="w-[375px] h-[750px] bg-white rounded-[3rem] shadow-2xl overflow-hidden border-[14px] border-gray-800 relative">
              {/* Notch */}
              <div className="absolute top-0 left-1/2 -translate-x-1/2 w-36 h-7 bg-gray-800 rounded-b-2xl z-50" />
              
              {/* Screen */}
              <div className="w-full h-full pt-7 overflow-hidden">
                {view === 'list' ? (
                  <ChatRoomList 
                    onSelectRoom={(room) => { 
                      setSelectedRoom(room); 
                      setView('detail'); 
                    }} 
                  />
                ) : (
                  <ChatRoomDetail 
                    room={selectedRoom} 
                    onBack={() => setView('list')} 
                  />
                )}
              </div>
            </div>

            {/* Instructions */}
            <div className="text-center mt-4 text-gray-400 text-sm">
              <p>Click vào một cuộc chat để xem chi tiết</p>
              <p>Trong chat, click "Tạo phiếu chốt mủ" để xem form</p>
            </div>
          </div>
        </div>
      );
    };

    // Render
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
